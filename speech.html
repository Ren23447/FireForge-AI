<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>FireForge AI — Training Mentor</title>
<meta name="description" content="FireForge AI is a futuristic firefighter training mentor — calm, disciplined, and always ready." />
<link rel="icon" type="image/png" href="https://raw.githubusercontent.com/Ren23447/FireForge-AI/main/Favicon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Orbitron:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
:root {
  --bg: #04060a;
  --panel: rgba(14, 20, 30, 0.55);
  --panel-border: rgba(120, 210, 255, 0.22);
  --blue: #4fc3ff;
  --blue-strong: #a6e8ff;
  --blue-dim: rgba(79, 195, 255, 0.4);
  --violet: #8a5cff;
  --violet-dim: rgba(138, 92, 255, 0.35);
  --ember: #4fc3ff;
  --text: #eef6fc;
  --text-dim: rgba(210, 228, 245, 0.62);
  --danger: #ff5d6c;
}
* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
  background: var(--bg); color: var(--text);
  font-family: "Rajdhani", "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
  -webkit-user-select: none; user-select: none;
}
#canvas-container { position: absolute; inset: 0; width: 100vw; height: 100vh; display: block; }
#fog-overlay {
  position: absolute; inset: 0; z-index: 5; pointer-events: none;
  background:
    radial-gradient(ellipse at 50% 12%, rgba(79, 195, 255, 0.12), transparent 55%),
    radial-gradient(ellipse at 50% 100%, rgba(0, 0, 0, 0.78), transparent 60%),
    radial-gradient(ellipse at 12% 92%, rgba(138, 92, 255, 0.08), transparent 55%),
    linear-gradient(to bottom, rgba(0, 0, 0, 0.4), transparent 20%, transparent 75%, rgba(0, 0, 0, 0.58));
}
#rune-frame { position: absolute; inset: 0; z-index: 4; pointer-events: none; opacity: 0.5; }
#rune-frame::before, #rune-frame::after {
  content: ""; position: absolute; border: 1px solid var(--blue-dim);
}
#rune-frame::before { top: 18px; left: 18px; right: 18px; bottom: 18px; border-radius: 2px; opacity: 0.14; }
#rune-frame .corner { position: absolute; width: 26px; height: 26px; border: 2px solid var(--blue); opacity: 0.55; }
#rune-frame .corner.tl { top: 14px; left: 14px; border-right: none; border-bottom: none; }
#rune-frame .corner.tr { top: 14px; right: 14px; border-left: none; border-bottom: none; }
#rune-frame .corner.bl { bottom: 14px; left: 14px; border-right: none; border-top: none; }
#rune-frame .corner.br { bottom: 14px; right: 14px; border-left: none; border-top: none; }
#embers { position: absolute; inset: 0; z-index: 6; pointer-events: none; overflow: hidden; }
.ember {
  position: absolute; bottom: -10px; width: 3px; height: 3px; border-radius: 50%;
  background: var(--ember); box-shadow: 0 0 6px 1px rgba(79, 195, 255, 0.9);
  opacity: 0; animation-name: ember-rise; animation-timing-function: ease-in; animation-iteration-count: infinite;
}
@keyframes ember-rise {
  0% { transform: translate(0, 0) scale(0.6); opacity: 0; }
  8% { opacity: 0.85; }
  70% { opacity: 0.5; }
  100% { transform: translate(var(--drift, 20px), -100vh) scale(1); opacity: 0; }
}
#ui-overlay { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: space-between; padding: 22px; pointer-events: none; z-index: 100; }
.glass-panel {
  background: var(--panel); backdrop-filter: blur(20px) saturate(150%); -webkit-backdrop-filter: blur(20px) saturate(150%);
  border: 1px solid var(--panel-border); border-radius: 14px;
  box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5), inset 0 0 0 1px rgba(255, 255, 255, 0.03), 0 0 24px rgba(79, 195, 255, 0.05);
}
header { display: flex; justify-content: space-between; align-items: center; pointer-events: auto; }
.brand { display: flex; align-items: center; gap: 12px; padding: 11px 20px 11px 14px; position: relative; overflow: hidden; }
.brand::before { content: ""; position: absolute; inset: 0; background: linear-gradient(120deg, rgba(79, 195, 255, 0.1), transparent 60%); }
.brand img { width: 28px; height: 28px; border-radius: 8px; object-fit: cover; box-shadow: 0 0 14px var(--blue-dim); position: relative; z-index: 1; }
.brand-text { display: flex; flex-direction: column; line-height: 1.15; position: relative; z-index: 1; }
.brand-title { font-family: "Orbitron", "Rajdhani", sans-serif; font-weight: 700; letter-spacing: 2.5px; font-size: 14px; color: var(--blue-strong); text-shadow: 0 0 16px var(--blue-dim); }
.brand-sub { font-size: 10px; letter-spacing: 3px; color: var(--text-dim); text-transform: uppercase; }
#chat-container { width: 100%; max-width: 520px; margin: 0 auto; display: flex; flex-direction: column; gap: 14px; pointer-events: auto; }
#chat-history { max-height: 260px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding: 4px 8px 4px 4px; scrollbar-width: none; mask-image: linear-gradient(to bottom, transparent, black 18%); }
#chat-history::-webkit-scrollbar { display: none; }
.message { padding: 12px 18px; border-radius: 16px; font-size: 14.5px; font-weight: 500; letter-spacing: 0.2px; line-height: 1.5; max-width: 82%; animation: rise-in 0.32s ease-out; }
@keyframes rise-in { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.user-msg { align-self: flex-end; background: linear-gradient(135deg, #2076ad 0%, #123a56 100%); border: 1px solid rgba(140, 216, 255, 0.35); color: #f2fbff; border-bottom-right-radius: 4px; box-shadow: 0 4px 18px rgba(32, 118, 173, 0.25); }
.mentor-msg { align-self: flex-start; background: rgba(138, 92, 255, 0.07); border: 1px solid var(--panel-border); color: var(--text); border-bottom-left-radius: 4px; box-shadow: 0 4px 18px rgba(0, 0, 0, 0.25); }
#input-bar { display: flex; align-items: center; gap: 8px; background: rgba(8, 12, 18, 0.65); padding: 8px; border-radius: 24px; border: 1px solid var(--panel-border); backdrop-filter: blur(22px); }
input#text-input { flex: 1; background: transparent; border: none; color: var(--text); padding: 0 16px; font-size: 15px; font-family: inherit; letter-spacing: 0.3px; outline: none; }
input#text-input::placeholder { color: rgba(210, 228, 245, 0.35); }
.icon-btn { width: 44px; height: 44px; flex-shrink: 0; border-radius: 50%; border: 1px solid transparent; background: rgba(255, 255, 255, 0.04); color: var(--text); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s ease; }
.icon-btn:hover { background: rgba(255, 255, 255, 0.09); transform: scale(1.05); }
.icon-btn svg { width: 19px; height: 19px; }
.send-btn { background: linear-gradient(135deg, #4fc3ff, #205fa0); box-shadow: 0 0 18px var(--blue-dim); color: #04121c; }
.send-btn:hover { filter: brightness(1.12); }
.mic-btn.active { background: rgba(255, 93, 108, 0.18); border-color: rgba(255, 93, 108, 0.55); animation: mic-pulse 1.4s infinite; }
@keyframes mic-pulse { 0% { box-shadow: 0 0 0 0 rgba(255, 93, 108, 0.4); } 70% { box-shadow: 0 0 0 14px rgba(255, 93, 108, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 93, 108, 0); } }
#mute-fab { position: absolute; top: 22px; right: 22px; width: 46px; height: 46px; border-radius: 50%; z-index: 101; pointer-events: auto; border: 1px solid var(--panel-border); background: var(--panel); backdrop-filter: blur(18px); color: var(--text); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s ease; box-shadow: 0 8px 24px rgba(0, 0, 0, 0.45); }
#mute-fab:hover { border-color: var(--blue-dim); color: var(--blue-strong); }
#mute-fab svg { width: 20px; height: 20px; }
#mute-fab.muted { color: var(--danger); }

/* ══════════ Loading screen — MONARCH'S GATE (Solo Leveling) ══════════ */
@keyframes sys-spin    { to { transform: rotate(360deg); } }
@keyframes sys-spin-r  { to { transform: rotate(-360deg); } }
@keyframes sys-pulse   { 0%,100%{opacity:.75;transform:rotate(45deg) scale(.92)} 50%{opacity:1;transform:rotate(45deg) scale(1.12)} }
@keyframes sys-flicker { 0%,100%{opacity:.55} 45%{opacity:1} 55%{opacity:.2} }
@keyframes sys-bar     { 0%{transform:translateX(-100%)} 100%{transform:translateX(300%)} }
@keyframes gate-breathe{ 0%,100%{opacity:.25;transform:scale(1)} 50%{opacity:.55;transform:scale(1.07)} }
@keyframes void-pulse  { 0%,100%{opacity:.5;transform:scale(1)} 50%{opacity:1;transform:scale(1.1)} }
@keyframes sl-appear   { from{opacity:0;transform:translateY(-10px)} to{opacity:1;transform:translateY(0)} }
@keyframes tap-pulse   { 0%,100%{opacity:.2;letter-spacing:3px} 50%{opacity:.85;letter-spacing:4.5px} }
@keyframes star-twinkle{ 0%,100%{opacity:0} 50%{opacity:1} }
@keyframes sl-scanline { 0%{background-position:0 0} 100%{background-position:0 200px} }
@keyframes rune-orbit  {
  from { transform: rotate(var(--start)) translateX(112px) rotate(calc(-1 * var(--start))); }
  to   { transform: rotate(calc(var(--start) + 360deg)) translateX(112px) rotate(calc(-1 * (var(--start) + 360deg))); }
}
@keyframes corona-spin { to { transform: rotate(360deg) scale(1.02); } }
@keyframes enter-glow  { 0%,100%{box-shadow:0 0 24px rgba(138,92,255,.5),inset 0 0 12px rgba(79,195,255,.15)} 50%{box-shadow:0 0 42px rgba(138,92,255,.85),0 0 18px rgba(79,195,255,.4),inset 0 0 18px rgba(79,195,255,.25)} }

#loading {
  position: absolute; inset: 0; z-index: 1000; transition: opacity 0.75s ease;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background:
    radial-gradient(ellipse at 50% 32%, rgba(90,20,200,.65) 0%, rgba(40,5,100,.55) 28%, transparent 58%),
    radial-gradient(ellipse at 50% 100%, rgba(8,2,24,.98), transparent 55%),
    #03010b;
  overflow: hidden; cursor: default;
}
/* CRT scanlines */
#loading::after {
  content:""; position:absolute; inset:0; pointer-events:none; z-index:0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,.12) 2px, rgba(0,0,0,.12) 3px);
  animation: sl-scanline 10s linear infinite; opacity:.4;
}
/* Perspective grid */
#loading::before {
  content:""; position:absolute; inset:0; pointer-events:none; z-index:0; opacity:.13;
  background-image: linear-gradient(rgba(110,40,255,.2) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(110,40,255,.2) 1px, transparent 1px);
  background-size: 46px 46px;
  mask-image: radial-gradient(ellipse at 50% 36%, black 0%, transparent 65%);
}

/* Background star field */
.sl-stars { position:absolute; inset:0; z-index:0; pointer-events:none; }
.sl-star {
  position:absolute; width:1.5px; height:1.5px; border-radius:50%; background:#fff;
  animation: star-twinkle var(--dur,3s) var(--delay,0s) ease-in-out infinite;
}

/* ── Gate portal ── */
.sl-gate {
  position: relative; width: 228px; height: 228px;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0; z-index: 1;
}
/* Outer corona glow */
.sl-gate-aura {
  position:absolute; inset:-36px; border-radius:50%; z-index:0;
  background: radial-gradient(ellipse at 50% 50%, rgba(110,30,255,.3) 0%, rgba(50,8,130,.2) 38%, transparent 68%);
  animation: void-pulse 3.8s ease-in-out infinite;
}
/* Gate void interior */
.sl-gate-bg {
  position:absolute; inset:0; border-radius:50%;
  background: radial-gradient(ellipse at 50% 44%,
    rgba(100,40,220,.75) 0%,
    rgba(30,8,80,.92) 42%,
    rgba(4,1,14,.98) 68%);
  animation: gate-breathe 3.2s ease-in-out infinite;
}
/* Stars inside gate */
.sl-gate-stars { position:absolute; inset:12px; border-radius:50%; overflow:hidden; z-index:1; pointer-events:none; }
.sl-gate-star {
  position:absolute; width:1.5px; height:1.5px; border-radius:50%; background:#c8a0ff;
  animation: star-twinkle var(--dur,2s) var(--delay,0s) ease-in-out infinite;
}

.sl-ring { position:absolute; border-radius:50%; }
.sl-ring.r1 {
  inset:0; border:1px solid rgba(110,40,255,.28);
  animation: sys-spin 14s linear infinite;
}
.sl-ring.r2 {
  inset:12px; border:1px dashed rgba(138,92,255,.4);
  animation: sys-spin-r 8s linear infinite;
}
.sl-ring.r3 {
  inset:28px;
  border-top:2.5px solid var(--blue); border-right:2.5px solid transparent;
  border-bottom:2.5px solid rgba(140,60,255,.85); border-left:2.5px solid transparent;
  box-shadow: 0 0 28px var(--blue-dim), inset 0 0 28px var(--violet-dim);
  animation: sys-spin 2.6s linear infinite;
}
.sl-ring.r4 {
  inset:46px; border:1px solid rgba(79,195,255,.1);
  animation: sys-spin-r 20s linear infinite;
}
.sl-ring.r5 {
  inset:62px; border:1px dashed rgba(180,130,255,.18);
  animation: sys-spin 6s linear infinite;
}
/* Glowing dots orbiting the outer ring */
.sl-ring.r1::before,.sl-ring.r1::after {
  content:""; position:absolute; width:8px; height:8px; border-radius:50%;
  background:var(--violet); box-shadow:0 0 14px 4px rgba(138,92,255,.75);
}
.sl-ring.r1::before { top:-4px; left:50%; transform:translateX(-50%); }
.sl-ring.r1::after  { bottom:-4px; left:50%; transform:translateX(-50%); }
/* Two extra side dots */
.sl-ring.r2::before,.sl-ring.r2::after {
  content:""; position:absolute; width:5px; height:5px; border-radius:50%;
  background:var(--blue); box-shadow:0 0 8px 2px var(--blue-dim);
}
.sl-ring.r2::before { left:-2.5px; top:50%; transform:translateY(-50%); }
.sl-ring.r2::after  { right:-2.5px; top:50%; transform:translateY(-50%); }

/* Orbiting rune glyphs */
.sl-rune {
  position:absolute; top:50%; left:50%; width:16px; height:16px;
  margin:-8px; display:flex; align-items:center; justify-content:center;
  font-size:12px; color:rgba(160,100,255,.65);
  text-shadow:0 0 8px rgba(138,92,255,.9);
  animation: rune-orbit var(--speed,15s) linear infinite;
}

/* Diamond core */
.sl-core {
  width:58px; height:58px; transform:rotate(45deg); z-index:3; position:relative;
  background: linear-gradient(135deg, #7838ff, #5010c0);
  box-shadow: 0 0 50px rgba(130,50,255,.7), 0 0 100px rgba(80,15,200,.4), 0 0 8px #c8a0ff inset;
  animation: sys-pulse 2.2s ease-in-out infinite;
}
.sl-core-inner {
  position:absolute; width:20px; height:20px;
  background:rgba(255,255,255,.92);
  box-shadow:0 0 22px 8px rgba(255,255,255,.5);
  top:50%; left:50%; margin:-10px;
}

/* ── System window panel ── */
.sl-panel {
  position:relative; z-index:1;
  margin-top:22px;
  width:min(368px,92vw);
  background:rgba(3,1,13,.9);
  border:1px solid rgba(110,40,255,.55);
  box-shadow:0 0 0 1px rgba(138,92,255,.22), 0 0 60px rgba(80,15,200,.38), inset 0 0 36px rgba(20,5,60,.65);
  animation: sl-appear .65s ease-out both;
}
.sl-panel::before {
  content:""; position:absolute; inset:5px; pointer-events:none;
  border:1px solid rgba(110,40,255,.14);
}
.sl-corner {
  position:absolute; width:11px; height:11px;
  background:var(--violet); box-shadow:0 0 12px 3px rgba(138,92,255,.65);
  clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%);
}
.sl-corner.tl{top:-5.5px;left:-5.5px} .sl-corner.tr{top:-5.5px;right:-5.5px}
.sl-corner.bl{bottom:-5.5px;left:-5.5px} .sl-corner.br{bottom:-5.5px;right:-5.5px}

.sl-panel-header {
  padding:10px 18px 9px;
  border-bottom:1px solid rgba(110,40,255,.28);
  display:flex; align-items:center; gap:10px;
}
.sl-sys-label {
  font-family:"Orbitron",sans-serif; font-size:11px; font-weight:700;
  letter-spacing:4px; color:var(--blue-strong);
  text-shadow:0 0 14px var(--blue-dim); text-transform:uppercase;
}
.sl-sys-dot {
  width:7px; height:7px; border-radius:50%; background:var(--violet);
  box-shadow:0 0 10px 3px rgba(138,92,255,.75);
  animation:sys-flicker 1.6s ease-in-out infinite; flex-shrink:0;
}

.sl-panel-body { padding:14px 20px 16px; }
.sl-notice-tag {
  font-family:"Orbitron",sans-serif; font-size:9px; font-weight:700;
  letter-spacing:3px; color:rgba(160,100,255,.8);
  text-shadow:0 0 8px rgba(138,92,255,.5);
  margin-bottom:6px; text-transform:uppercase;
}
.sl-alert-line {
  font-family:"Orbitron",sans-serif; font-size:15px; font-weight:700;
  letter-spacing:1px; color:#fff;
  text-shadow:0 0 24px rgba(130,50,255,.9);
  margin-bottom:7px;
}
.sl-sub-line {
  font-size:11px; letter-spacing:2px; color:var(--text-dim); text-transform:uppercase;
  margin-bottom:12px; animation:sys-flicker 2.6s ease-in-out infinite;
}
.sl-divider {
  width:100%; height:1px;
  background:linear-gradient(90deg,transparent,rgba(110,40,255,.55),rgba(79,195,255,.35),transparent);
  margin-bottom:11px;
}
.sl-stat-row {
  display:flex; justify-content:space-between; align-items:center;
  font-size:10px; letter-spacing:1.5px; text-transform:uppercase;
  color:rgba(210,228,245,.38); margin-bottom:6px;
}
.sl-val {
  font-family:"Orbitron",sans-serif; font-size:9.5px; font-weight:700; letter-spacing:2px;
}
.sl-val.loading { color:rgba(79,195,255,.8); animation:sys-flicker 1.1s ease-in-out infinite; }
.sl-val.srank   { color:#e8b030; text-shadow:0 0 10px rgba(232,176,48,.5); }

.sl-progress-label {
  font-size:9px; letter-spacing:2.5px; color:rgba(110,40,255,.75);
  text-transform:uppercase; margin-bottom:5px; margin-top:10px;
}
.sl-bar-track {
  width:100%; height:3px; background:rgba(255,255,255,.04);
  border:1px solid rgba(110,40,255,.25); overflow:hidden;
}
.sl-bar-fill {
  width:28%; height:100%;
  background:linear-gradient(90deg,var(--violet),var(--blue));
  box-shadow:0 0 12px rgba(138,92,255,.6);
  animation:sys-bar 1.5s ease-in-out infinite;
}
.sl-tap-prompt {
  text-align:center; margin-top:14px;
  font-family:"Orbitron",sans-serif; font-size:9px; font-weight:700;
  letter-spacing:3px; color:rgba(138,92,255,.55); text-transform:uppercase;
  animation:tap-pulse 2.2s ease-in-out infinite;
}

/* ── Enter button — shown after model is ready ── */
#enter-btn {
  display: none;
  margin: 14px auto 0;
  padding: 11px 36px;
  font-family: "Orbitron", sans-serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 5px;
  color: #fff;
  background: linear-gradient(135deg, rgba(110,40,255,.72), rgba(79,195,255,.48));
  border: 1px solid rgba(138,92,255,.85);
  border-radius: 2px;
  cursor: pointer;
  text-transform: uppercase;
  transition: background 0.2s ease, letter-spacing 0.2s ease, transform 0.15s ease;
  animation: sl-appear .45s ease-out both, enter-glow 2s ease-in-out infinite;
  /* allow pointer events on the button even though #loading cursor is default */
  pointer-events: auto;
}
#enter-btn:hover {
  background: linear-gradient(135deg, rgba(110,40,255,.92), rgba(79,195,255,.72));
  letter-spacing: 6px;
  transform: scale(1.04);
}
#enter-btn:active {
  transform: scale(0.97);
}

#loading.ready { pointer-events:none; }

#debug-toggle { position: fixed; top: 22px; right: 78px; z-index: 2000; pointer-events: auto; background: rgba(255, 93, 108, 0.12); border: 1px solid rgba(255, 93, 108, 0.5); color: #ffb0b8; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; padding: 8px 14px; border-radius: 20px; cursor: pointer; display: none; }
#debug-toggle.has-error { display: block; animation: mic-pulse 1.6s infinite; }
#debug-panel { position: fixed; inset: 0; z-index: 3000; background: rgba(4, 6, 9, 0.97); display: none; flex-direction: column; padding: 18px; pointer-events: auto; }
#debug-panel.visible { display: flex; }
#debug-panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; flex-wrap: wrap; gap: 8px; }
#debug-panel-header h3 { margin: 0; font-size: 14px; letter-spacing: 2px; color: var(--blue-strong); }
#debug-panel-buttons { display: flex; gap: 8px; }
#debug-panel-buttons button { background: rgba(255, 255, 255, 0.06); border: 1px solid var(--panel-border); color: var(--text); padding: 8px 14px; border-radius: 10px; font-size: 12px; letter-spacing: 0.5px; cursor: pointer; font-family: inherit; }
#debug-panel-buttons button.copy-btn { background: linear-gradient(135deg, #4fc3ff, #205fa0); border-color: transparent; color: #04121c; }
#debug-log { flex: 1; overflow-y: auto; background: rgba(255, 255, 255, 0.03); border: 1px solid var(--panel-border); border-radius: 12px; padding: 12px; font-family: "SFMono-Regular", Consolas, Menlo, monospace; font-size: 12px; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
.log-line { padding: 4px 0; border-bottom: 1px solid rgba(255, 255, 255, 0.04); }
.log-error { color: #ff9aa4; }
.log-warn { color: #ffd07f; }
.log-info { color: rgba(210, 228, 245, 0.55); }
@media (max-width: 560px) {
  #ui-overlay { padding: 14px; }
  .brand { padding: 10px 14px; }
  .brand-title { font-size: 13px; }
  #chat-history { max-height: 190px; }
  #mute-fab { top: 14px; right: 14px; width: 40px; height: 40px; }
  #debug-toggle { top: 14px; right: 62px; }
  .sys-emblem { width: 100px; height: 100px; }

/* ---------------- Debug / error log overlay ---------------- */
(function initDebugLog() {
  const MAX_LINES = 300;
  const lines = [];
  const logEl = document.getElementById("debug-log");
  const toggleBtn = document.getElementById("debug-toggle");
  const panel = document.getElementById("debug-panel");

  function timestamp() { return new Date().toTimeString().split(" ")[0] || ""; }
  function stringifyArg(a) {
    if (a instanceof Error) return a.stack || (a.name + ": " + a.message);
    if (typeof a === "object" && a !== null) { try { return JSON.stringify(a); } catch { return String(a); } }
    return String(a);
  }
  function renderLog() {
    if (!logEl) return;
    logEl.innerHTML = lines.map((l) => `<div class="log-line log-${l.level}">${l.text.replace(/</g, "&lt;")}</div>`).join("");
    logEl.scrollTop = logEl.scrollHeight;
  }
  function pushLog(level, args) {
    const text = `[${timestamp()}] ${level.toUpperCase()}: ${args.map(stringifyArg).join(" ")}`;
    lines.push({ level, text });
    if (lines.length > MAX_LINES) lines.shift();
    renderLog();
    if (level === "error") toggleBtn?.classList.add("has-error");
  }
  const originalLog = console.log.bind(console);
  const originalWarn = console.warn.bind(console);
  const originalError = console.error.bind(console);
  console.log = (...args) => { pushLog("info", args); originalLog(...args); };
  console.warn = (...args) => { pushLog("warn", args); originalWarn(...args); };
  console.error = (...args) => { pushLog("error", args); originalError(...args); };
  window.addEventListener("error", (e) => {
    if (e.error) pushLog("error", [`Uncaught error: ${e.message}`, `(${e.filename}:${e.lineno}:${e.colno})`, e.error.stack || ""]);
    else pushLog("error", [`Uncaught error: ${e.message}`]);
  });
  window.addEventListener("unhandledrejection", (e) => pushLog("error", ["Unhandled promise rejection:", e.reason]));
  toggleBtn?.addEventListener("click", () => panel?.classList.add("visible"));
  document.getElementById("debug-close-btn")?.addEventListener("click", () => panel?.classList.remove("visible"));
  document.getElementById("debug-copy-btn")?.addEventListener("click", () => {
    const text = lines.map((l) => l.text).join("\n");
    const fallbackCopy = () => {
      const ta = document.createElement("textarea");
      ta.value = text; ta.style.position = "fixed"; ta.style.opacity = "0";
      document.body.appendChild(ta); ta.focus(); ta.select();
      try { document.execCommand("copy"); } catch {}
      document.body.removeChild(ta);
    };
    if (navigator.clipboard?.writeText) navigator.clipboard.writeText(text).catch(fallbackCopy);
    else fallbackCopy();
    const btn = document.getElementById("debug-copy-btn");
    if (btn) { const original = btn.textContent; btn.textContent = "Copied!"; setTimeout(() => (btn.textContent = original), 1500); }
  });
  // Only auto-open the error log if the loading screen is still visible AND
  // the model-ready class has NOT been set (i.e. we are genuinely still loading,
  // not just waiting for the player to press Enter).
  setTimeout(() => {
    const loadingStillEl = document.getElementById("loading");
    if (loadingStillEl && !loadingStillEl.classList.contains("model-ready")) {
      pushLog("warn", ["Still loading after 15s — opening error log automatically."]);
      panel?.classList.add("visible");
    }
  }, 15000);
  pushLog("info", ["Debug logger ready."]);
})();

function initEmbers(container, count = 26) {
  for (let i = 0; i < count; i++) {
    const ember = document.createElement("div");
    ember.className = "ember";
    const left = Math.random() * 100;
    const size = 2 + Math.random() * 3;
    const duration = 7 + Math.random() * 9;
    const delay = Math.random() * duration;
    const drift = (Math.random() - 0.5) * 120;
    ember.style.left = `${left}%`;
    ember.style.width = `${size}px`;
    ember.style.height = `${size}px`;
    ember.style.animationDuration = `${duration}s`;
    ember.style.animationDelay = `-${delay}s`;
    ember.style.setProperty("--drift", `${drift}px`);
    container.appendChild(ember);
  }
}

};

function pickLine(category) {
  const ids = CATEGORY[category] || CATEGORY.fallback;
  const id = ids[Math.floor(Math.random() * ids.length)];
  return { id, text: DIALOGUE[id] || "" };
}

const PATTERNS = [
  { regex: /\b(who are you|your name|what are you)\b/i, category: "identity", pose: "neutral" },
  { regex: /\b(bye|goodbye|good ?night|see you|farewell|later)\b/i, category: "farewell", pose: "neutral" },
  { regex: /\b(thank you|thanks|appreciate)\b/i, category: "thanks", pose: "affirm" },
  { regex: /\b(sleep|nap|bed|insomnia)\b/i, category: "sleep", pose: "neutral" },
  { regex: /\b(eat|food|meal|diet|protein|nutrition|hungry)\b/i, category: "nutrition", pose: "neutral" },
  { regex: /\b(sore|soreness|ache|aching|hurts?|injury|injured|pain)\b/i, category: "soreness", pose: "alert" },
  { regex: /\b(impossible|scared|afraid|doubt|never make it|too hard)\b/i, category: "doubt", pose: "affirm" },
  { regex: /\b(level ?up|leveled up|personal record|\bpr\b|stronger|progress|improv(ed|ing))\b/i, category: "levelup", pose: "affirm" },
  { regex: /\b(hi|hello|hey)\b/i, category: "greetings", pose: "greet" },
  { regex: /\b(ready|begin|start|train|training|drill|workout)\b/i, category: "opening", pose: "focus" },
  { regex: /\b(done|finish|finished|complete|completed)\b/i, category: "completion", pose: "affirm" },
  { regex: /\b(tired|missed|skip|skipped|lazy|can'?t|give up)\b/i, category: "inactivity", pose: "alert" },
  { regex: /\b(motivat|advice|help|struggl|hard|difficult)\b/i, category: "encouragement", pose: "affirm" },
];

function getMentorReply(input) {
  for (const pattern of PATTERNS) {
    if (pattern.regex.test(input)) {
      const line = pickLine(pattern.category);
      return { id: line.id, text: line.text, pose: pattern.pose };
    }
  }
  const line = pickLine("fallback");
  return { id: line.id, text: line.text, pose: "neutral" };
}

/* ================================================================
   MENTOR VOICE
   Priority order for every line:
     1. Recorded MP3 from JINWOO_AUDIO_MAP  ← Jinwoo's real voice
     2. Device speech-synthesis TTS          ← silent fallback only
   Mouth animation (isSpeaking flag) is driven by the audio element's
   onplay / onended events, so it starts and stops exactly in sync
   with the recording — no guessing, no timers.
   ================================================================ */
const MentorVoice = {
  synthesis: window.speechSynthesis,
  isListening: false,
  recognition: null,
  muted: false,
  preferredVoice: null,
  currentAudio: null,

  init() {
    const SpeechRecognitionCtor = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SpeechRecognitionCtor) {
      this.recognition = new SpeechRecognitionCtor();
      this.recognition.continuous = false;
      this.recognition.lang = "en-US";
      this.recognition.interimResults = false;
      this.recognition.maxAlternatives = 1;
      this.recognition.onstart = () => { this.isListening = true; document.getElementById("mic-btn")?.classList.add("active"); console.log("Voice: listening..."); };
      this.recognition.onend = () => { this.isListening = false; document.getElementById("mic-btn")?.classList.remove("active"); };
      this.recognition.onresult = (event) => {
        const transcript = event.results[0]?.[0]?.transcript || "";
        console.log("Voice input:", transcript);
        const inputField = document.getElementById("text-input");
        if (inputField) { inputField.value = transcript; handleInput(); }
      };
      document.getElementById("mic-btn")?.addEventListener("click", () => {
        if (this.isListening) this.recognition.stop(); else this.recognition.start();
      });
    } else {
      console.warn("Speech Recognition API not supported on this device.");
      const micBtn = document.getElementById("mic-btn");
      if (micBtn) micBtn.style.display = "none";
    }

    if ("onvoiceschanged" in this.synthesis) this.synthesis.onvoiceschanged = () => this.loadVoices();
    this.loadVoices();

    document.getElementById("mute-fab")?.addEventListener("click", () => {
      this.muted = !this.muted;
      if (this.muted) {
        if (this.currentAudio) { this.currentAudio.pause(); this.currentAudio = null; }
        this.synthesis.cancel();
        isSpeaking = false;
      }
      document.getElementById("mute-fab")?.classList.toggle("muted", this.muted);
    });
  },

  loadVoices() {
    const voices = this.synthesis.getVoices();
    const PREMIUM_HINTS = ["natural", "neural", "online", "premium", "enhanced", "wavenet"];
    const MALE_VOICE_NAMES = ["Guy", "Ryan", "Davis", "Tony", "Christopher", "Eric", "Daniel", "Google UK English Male", "David", "Mark", "Alex", "Fred", "Aaron", "Arthur", "Oliver"];
    const isLikelyFemale = (v) => /female|woman|zira|samantha|victoria|karen|moira|tessa|susan|aria|jenny|michelle|ana|emma/i.test(v.name);
    const isLikelyMale = (v) => /male|man|guy|davis|ryan|tony|christopher|eric|david|mark|daniel|alex|fred|aaron|arthur|oliver|james|thomas|george/i.test(v.name) && !isLikelyFemale(v);
    const isPremium = (v) => PREMIUM_HINTS.some((h) => v.name.toLowerCase().includes(h));
    const score = (v) => {
      let s = 0;
      if (v.lang.startsWith("en")) s += 4;
      if (isLikelyMale(v)) s += 6;
      if (isLikelyFemale(v)) s -= 6;
      if (isPremium(v)) s += 5;
      if (MALE_VOICE_NAMES.some((n) => v.name.includes(n))) s += 3;
      return s;
    };
    this.preferredVoice = voices.length ? voices.slice().sort((a, b) => score(b) - score(a))[0] : null;
  },

  speak(id, text) {
    if (this.muted) return;

    // Stop whatever is currently playing
    if (this.currentAudio) { this.currentAudio.pause(); this.currentAudio = null; }
    if (this.synthesis) this.synthesis.cancel();
    isSpeaking = false;

    const entry = id ? JINWOO_AUDIO_MAP[id] : null;

    if (entry) {
      console.log(`[Voice] Playing clip: (${entry.url}) ("${entry.text}")`);
      const audio = new Audio(entry.url);
      this.currentAudio = audio;

      audio.onplay  = () => { isSpeaking = true; speakStartTime = clock.elapsedTime; };
      audio.onended = () => {
        isSpeaking = false;
        if (this.currentAudio === audio) this.currentAudio = null;
      };
      audio.onerror = () => {
        console.warn(`[Voice] Clip failed for "${id}", falling back to TTS.`);
        if (this.currentAudio === audio) this.currentAudio = null;
        isSpeaking = false;
        this.speakFallback(text);
      };
      audio.play().catch(() => {
        if (this.currentAudio === audio) this.currentAudio = null;
        isSpeaking = false;
        this.speakFallback(text);
      });
    } else {
      this.speakFallback(text);
    }
  },

  speakFallback(text) {
    if (!this.synthesis || this.muted || !text) return;
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.pitch = 0.72;
    utterance.rate = 0.88;
    utterance.volume = 1.0;
    if (!this.preferredVoice) this.loadVoices();
    const voices = this.synthesis.getVoices();
    const voice = this.preferredVoice || voices.find((v) => v.lang === "en-US") || voices[0];
    if (voice) utterance.voice = voice;
    utterance.onstart = () => { isSpeaking = true; speakStartTime = clock.elapsedTime; };
    utterance.onend   = () => { isSpeaking = false; };
    this.synthesis.speak(utterance);
  },
};

/* ================================================================
   IDLE ANIMATION — Breathing Idle (FBX from Mixamo)
   Loads "Breathing Idle.fbx" from the GitHub repo, retargets its
   Mixamo bone tracks onto the VRM's normalized humanoid skeleton,
   and plays the clip in an infinite loop via AnimationMixer.
   The manual spine/chest oscillation is disabled once the FBX
   animation takes over.
   ================================================================ */
const IDLE_FBX_URL = "https://raw.githubusercontent.com/Ren23447/FireForge-AI/main/Breathing%20Idle.fbx";

// Mixamo bone name → VRM humanoid bone name (full map kept for reference)
const MIXAMO_VRM_BONE_MAP = {
  mixamorigHips:           "hips",
  mixamorigSpine:          "spine",
  mixamorigSpine1:         "chest",
  mixamorigSpine2:         "upperChest",
  mixamorigNeck:           "neck",
  mixamorigHead:           "head",
  mixamorigLeftShoulder:   "leftShoulder",
  mixamorigLeftArm:        "leftUpperArm",
  mixamorigLeftForeArm:    "leftLowerArm",
  mixamorigLeftHand:       "leftHand",
  mixamorigRightShoulder:  "rightShoulder",
  mixamorigRightArm:       "rightUpperArm",
  mixamorigRightForeArm:   "rightLowerArm",
  mixamorigRightHand:      "rightHand",
  mixamorigLeftUpLeg:      "leftUpperLeg",
  mixamorigLeftLeg:        "leftLowerLeg",
  mixamorigLeftFoot:       "leftFoot",
  mixamorigLeftToeBase:    "leftToes",
  mixamorigRightUpLeg:     "rightUpperLeg",
  mixamorigRightLeg:       "rightLowerLeg",
  mixamorigRightFoot:      "rightFoot",
  mixamorigRightToeBase:   "rightToes",
};

// Only retarget pure torso bones for the breathing animation.
// - Shoulders EXCLUDED: Mixamo breathing idle stores them at T-pose
//   (arms-horizontal) quaternions, which lifts the VRM's arms up.
// - Head/neck EXCLUDED: manual mouse-tracking owns those.
// - Arms/legs EXCLUDED: same T-pose quaternion problem.
const BREATHING_BONE_WHITELIST = new Set([
  "hips",
  "spine",
  "chest",
  "upperChest",
]);

let idleMixer = null;

/**
 * Retarget a Mixamo AnimationClip to the VRM's normalized humanoid nodes,
 * keeping only the torso bones that are relevant to a breathing animation.
 */
function retargetMixamoClip(clip, vrm) {
  const retargetedTracks = [];
  let mappedCount = 0;

  for (const track of clip.tracks) {
    const dotIdx = track.name.lastIndexOf(".");
    if (dotIdx === -1) continue;

    const mixamoBone = track.name.substring(0, dotIdx);
    const property   = track.name.substring(dotIdx + 1);

    const vrmBoneName = MIXAMO_VRM_BONE_MAP[mixamoBone];
    if (!vrmBoneName) continue;

    // Skip any bone not in the breathing whitelist
    if (!BREATHING_BONE_WHITELIST.has(vrmBoneName)) continue;

    const vrmNode = vrm.humanoid.getNormalizedBoneNode(vrmBoneName);
    if (!vrmNode) continue;

    const newTrack = track.clone();
    newTrack.name = `${vrmNode.name}.${property}`;

    if (property === "position") {
      // Keep hips position (vertical bounce of breathing), scale cm → m
      if (vrmBoneName === "hips") {
        newTrack.values = new Float32Array(track.values.map((v) => v * 0.01));
        retargetedTracks.push(newTrack);
        mappedCount++;
      }
      // Discard position tracks for all other bones
    } else {
      retargetedTracks.push(newTrack);
      mappedCount++;
    }
  }

  console.log(`[IdleAnim] Retargeted ${mappedCount} breathing tracks from "${clip.name}" (${clip.tracks.length} source tracks).`);
  return new THREE.AnimationClip("breathing-idle", clip.duration, retargetedTracks);
}

/**
 * Load the FBX idle animation and attach it to the VRM.
 * Called once after the VRM model is ready.
 */
function loadIdleAnimation(vrm) {
  console.log("[IdleAnim] Loading Breathing Idle FBX...");
  const loader = new FBXLoader();
  loader.load(
    IDLE_FBX_URL,
    (fbx) => {
      if (!fbx.animations || fbx.animations.length === 0) {
        console.warn("[IdleAnim] FBX loaded but contains no animation clips.");
        return;
      }

      const sourceClip = fbx.animations[0];
      console.log(`[IdleAnim] FBX loaded. Clip: "${sourceClip.name}", duration: ${sourceClip.duration.toFixed(2)}s, tracks: ${sourceClip.tracks.length}`);

      const retargetedClip = retargetMixamoClip(sourceClip, vrm);

      if (retargetedClip.tracks.length === 0) {
        console.warn("[IdleAnim] Retargeting produced 0 tracks — bone names may not match. Falling back to procedural breathing.");
        return;
      }

      // Create mixer on the VRM scene so AnimationMixer can resolve node names
      idleMixer = new THREE.AnimationMixer(vrm.scene);
      const action = idleMixer.clipAction(retargetedClip);
      action.setLoop(THREE.LoopRepeat, Infinity);
      action.clampWhenFinished = false;
      action.play();

      console.log(`[IdleAnim] Breathing Idle animation playing (${retargetedClip.tracks.length} tracks, looping).`);
    },
    (xhr) => {
      if (xhr.total) console.log(`[IdleAnim] FBX loading: ${((xhr.loaded / xhr.total) * 100).toFixed(0)}%`);
    },
    (error) => {
      console.warn("[IdleAnim] Failed to load FBX idle animation — procedural breathing will be used instead.", error);
    }
  );
}

function onMouseMove(event) {
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
  updateLookAtTarget();
  registerActivity();
}
function onTouchMove(event) {
  const touch = event.touches[0];
  if (touch) {
    mouse.x = (touch.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(touch.clientY / window.innerHeight) * 2 + 1;
    updateLookAtTarget();
    registerActivity();
  }
}
function updateLookAtTarget() {
  const moveRange = 1.6;
  lookAtTarget.x = mouse.x * moveRange;
  lookAtTarget.y = 1.42 + mouse.y * moveRange * 0.4;
  lookAtTarget.z = -1.8;
}
function registerActivity() { lastInputAt = Date.now(); }

function loadVRM(url) {
  const loader = new GLTFLoader();
  loader.register((parser) => new VRMLoaderPlugin(parser));
  loader.load(
    url,
    (gltf) => {
      const vrm = gltf.userData.vrm;
      if (!vrm) { console.error("Model loaded but has no VRM data."); showLoadError("The model file loaded but isn't a valid VRM character."); return; }
      VRMUtils.removeUnnecessaryVertices(gltf.scene);
      VRMUtils.combineSkeletons(gltf.scene);
      currentVrm = vrm;
      scene.add(vrm.scene);

      vrm.scene.rotation.y = 0;
      const debugReadout = document.getElementById("debug-readout");
      if (debugReadout) {
        debugReadout.textContent = "vrm:" + ((vrm.meta && vrm.meta.metaVersion) || "?") + " rot:" + Math.round((vrm.scene.rotation.y * 180) / Math.PI) + "\u00b0";
      }
      vrm.scene.traverse((obj) => { if (obj.isMesh) obj.castShadow = true; });

      // Fix hair reflectivity — VRM hair materials are often highly specular,
      // which causes them to blow out white under even moderate lighting.
      vrm.scene.traverse((obj) => {
        if (!obj.isMesh) return;
        const mats = Array.isArray(obj.material) ? obj.material : [obj.material];
        mats.forEach((mat) => {
          if (!mat) return;
          const name = (mat.name || obj.name || "").toLowerCase();
          const isHair = name.includes("hair") || name.includes("髪");
          if (!isHair) return;

          // Force hair to black, matte, non-reflective on every material type
          const black = new THREE.Color(0x0a0a0a);

          // MToon (VRM toon shader)
          if (mat.isMToonMaterial) {
            if (mat.color !== undefined)               mat.color.set(black);
            if (mat.shadeColor !== undefined)          mat.shadeColor.set(0x000000);
            if (mat.rimLightingMixFactor !== undefined) mat.rimLightingMixFactor = 0;
            if (mat.rimMultiplyTexture   !== undefined) mat.rimMultiplyTexture   = null;
            if (mat.shadingToonyFactor   !== undefined) mat.shadingToonyFactor   = 1.0;
            if (mat.map !== undefined)                 mat.map = null; // remove texture so colour takes effect
          }

          // Standard / Physical materials
          if (mat.isMeshStandardMaterial || mat.isMeshPhysicalMaterial) {
            mat.color.set(black);
            mat.metalness       = 0;
            mat.roughness       = 1;
            mat.envMapIntensity = 0;
            mat.map             = null; // remove colour texture
          }

          mat.needsUpdate = true;
        });
      });

      if (vrm.lookAt) { vrm.lookAt.target = new THREE.Object3D(); scene.add(vrm.lookAt.target); }

      const humanoid = vrm.humanoid;
      for (const [key, rot] of Object.entries(REST_ARMS)) {
        const node = humanoid?.getNormalizedBoneNode(key);
        if (node) node.rotation.set(rot.x, rot.y, rot.z);
      }

      triggerPose("neutral");

      // Start the FBX idle animation after VRM is ready
      loadIdleAnimation(vrm);

      // Detect returning vs new user BEFORE restore() creates the device ID.
      const isReturning = !!localStorage.getItem("fireforge_device_id");
      const hasHistory  = ChatMemory.restore(); // renders history, creates device ID if new

      // ── Model is ready: show the Enter button instead of auto-dismissing ──
      // This guarantees the user provides a gesture before audio plays,
      // so the welcome-back and intro MP3s are never blocked by the browser.
      const loadingEl = document.getElementById("loading");
      if (loadingEl) {
        // Mark as model-ready so the 15-second error-catcher skips it
        loadingEl.classList.add("model-ready");

        // Swap the "Synchronizing…" prompt for the Enter button
        const tapPrompt = document.getElementById("sl-tap-prompt");
        if (tapPrompt) tapPrompt.style.display = "none";

        const mentorStatus = document.getElementById("sl-mentor-status");
        if (mentorStatus) { mentorStatus.textContent = "Online"; mentorStatus.classList.remove("loading"); mentorStatus.style.color = "rgba(79,195,255,1)"; }

        const syncLabel = document.getElementById("sl-sync-label");
        if (syncLabel) syncLabel.textContent = "Ready";

        const enterBtn = document.getElementById("enter-btn");
        if (enterBtn) {
          enterBtn.style.display = "block";

          enterBtn.addEventListener("click", () => {
            // 1. Unlock browser audio policy via the user gesture
            unlockAudio();

            // 2. Dismiss loading screen
            loadingEl.style.opacity = "0";
            setTimeout(() => { loadingEl.remove(); }, 750);

            // 3. Play the appropriate audio — audio is now guaranteed unlocked
            if (isReturning && hasHistory) {
              const id = "welcome_back", text = DIALOGUE.welcome_back;
              setTimeout(() => {
                addMessage(MENTOR_NAME, text);
                MentorVoice.speak(id, text);
              }, 400);
            } else {
              addMessage(MENTOR_NAME, DIALOGUE.intro_player);
              triggerPose("greet");
              setTimeout(() => MentorVoice.speak("intro_1", DIALOGUE.intro_player), 400);
            }
          }, { once: true });
        }
      }
    },
    (xhr) => { if (xhr.total) console.log(`Model loading: ${((xhr.loaded / xhr.total) * 100).toFixed(0)}%`); },
    (error) => { console.error("Failed to load VRM model from", url, error); showLoadError("The mentor's model failed to load. This is usually a network issue or the model file being unreachable."); },
  );
}

function showLoadError(message) {
  const loadingEl = document.getElementById("loading");
  if (loadingEl) {
    loadingEl.innerHTML = `<p style="color:#ff9aa4; text-align:center; max-width:320px; padding:0 20px; font-size:14px; line-height:1.6;">${message}<br><br>Tap "View error log" in the top right for details.</p>`;
    loadingEl.style.opacity = "1";
  }
  document.getElementById("debug-toggle")?.classList.add("has-error");
}

function onWindowResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

function triggerPose(poseName) {
  const pose = POSE_LIBRARY[poseName];
  if (!pose) return;
  if (poseTimer) clearTimeout(poseTimer);
  currentPose = poseName;
  targetPoseData = pose;
  isTransitioning = true;
  if (poseName !== "neutral") poseTimer = setTimeout(() => triggerPose("neutral"), POSE_DURATION);
}

function updatePoseAnimation() {
  if (!isTransitioning || !currentVrm || !targetPoseData) return;
  const humanoid = currentVrm.humanoid;
  let maxDiff = 0;
  for (const [key, data] of Object.entries(targetPoseData)) {
    const node = humanoid?.getNormalizedBoneNode(key);
    if (!node) continue;
    let rot = null, pos = null;
    if (data.rotation || data.position) { rot = data.rotation || null; pos = data.position || null; }
    else rot = data;
    if (rot) {
      const targetQ = new THREE.Quaternion().setFromEuler(new THREE.Euler(rot.x, rot.y, rot.z));
      const angle = node.quaternion.angleTo(targetQ);
      if (angle > maxDiff) maxDiff = angle;
      node.quaternion.slerp(targetQ, SMOOTHING_FACTOR);
    }
    if (pos) {
      const targetPos = new THREE.Vector3(pos.x, pos.y, pos.z);
      const dist = node.position.distanceTo(targetPos);
      if (dist > maxDiff) maxDiff = dist;
      node.position.lerp(targetPos, SMOOTHING_FACTOR);
    }
  }
  if (maxDiff < POSE_THRESHOLD) isTransitioning = false;
}

function animate() {
  requestAnimationFrame(animate);
  const deltaTime = clock.getDelta();
  const time = clock.elapsedTime;
  const idleMs = Date.now() - lastInputAt;
  const isIdle = idleMs > 2200;

  if (currentVrm) {
    if (isIdle) {
      idleLookOffset.x = Math.sin(time * 0.25) * 0.35;
      idleLookOffset.y = Math.sin(time * 0.18 + 1.3) * 0.12;
    } else idleLookOffset.set(0, 0, 0);

    if (currentVrm.lookAt) {
      const blended = lookAtTarget.clone().add(isIdle ? idleLookOffset : new THREE.Vector3());
      currentVrm.lookAt.target.position.lerp(blended, SMOOTHING_FACTOR);
    }

    // Procedural spine/chest breathing — fallback when FBX idle isn't loaded
    if (!idleMixer) {
      const spine = currentVrm.humanoid?.getNormalizedBoneNode(VRMHumanBoneName.Spine);
      if (spine) spine.rotation.x = Math.sin(time * 1.05) * 0.022;

      const chest = currentVrm.humanoid?.getNormalizedBoneNode(VRMHumanBoneName.Chest);
      if (chest) chest.rotation.x = Math.sin(time * 1.05 + 0.4) * 0.012;
    }

    // Tick the FBX breathing AnimationMixer BEFORE head tracking.
    // If we set head rotation first the mixer would stomp it on the same frame.
    if (idleMixer) idleMixer.update(deltaTime);

    // Head mouse/touch tracking — applied AFTER the mixer so it always wins.
    const head = currentVrm.humanoid?.getNormalizedBoneNode(VRMHumanBoneName.Head);
    if (head) {
      const limit = 0.42;
      const idleSway = isIdle ? Math.sin(time * 0.3) * 0.05 : 0;
      const targetX = THREE.MathUtils.clamp(mouse.y * 0.26, -limit, limit);
      const targetY = THREE.MathUtils.clamp(mouse.x * 0.42 + (isIdle ? idleSway : 0), -limit, limit);
      head.rotation.x = THREE.MathUtils.lerp(head.rotation.x, targetX, SMOOTHING_FACTOR);
      head.rotation.y = THREE.MathUtils.lerp(head.rotation.y, targetY, SMOOTHING_FACTOR);
    }

    updatePoseAnimation();

    if (currentVrm.expressionManager) {
      if (isSpeaking) {
        // Multi-harmonic procedural mouth — looks like real speech movement.
        // attack: fast 0→1 ramp over ~0.15s so the mouth doesn't snap open.
        const elapsed = time - speakStartTime;
        const attack   = Math.min(1, elapsed * 7);
        // Three harmonics at speech-like frequencies give natural variation
        // without the robotic regularity of a single sine wave.
        const wave =
          Math.sin(time * 13.8) * 0.50 +
          Math.sin(time *  8.2) * 0.30 +
          Math.sin(time *  4.6) * 0.20;
        // Centre the wave around 0.24 so the mouth stays mostly open while
        // talking; clamp so it never goes negative.
        const mouthOpen = attack * Math.max(0, wave * 0.38 + 0.24);
        currentVrm.expressionManager.setValue(VRMExpressionPresetName.Aa, mouthOpen);
        currentVrm.expressionManager.setValue(VRMExpressionPresetName.Ih, mouthOpen * 0.35);
      } else {
        // Smooth close — lerp toward 0 instead of snapping shut.
        const currentAa = currentVrm.expressionManager.getValue(VRMExpressionPresetName.Aa) || 0;
        const currentIh = currentVrm.expressionManager.getValue(VRMExpressionPresetName.Ih) || 0;
        currentVrm.expressionManager.setValue(VRMExpressionPresetName.Aa, currentAa > 0.005 ? currentAa * 0.75 : 0);
        currentVrm.expressionManager.setValue(VRMExpressionPresetName.Ih, currentIh > 0.005 ? currentIh * 0.75 : 0);
      }
    }

    if (Math.random() < 0.008) blink();

    currentVrm.update(deltaTime);
  }

  controls.update();
  renderer.render(scene, camera);
}

function blink() {
  if (!currentVrm?.expressionManager) return;
  const expressionManager = currentVrm.expressionManager;
  let t = 0;
  const interval = setInterval(() => {
    t += 0.05;
    const value = Math.sin(t * Math.PI) * 1.0;
    expressionManager.setValue(VRMExpressionPresetName.Blink, Math.max(0, value));
    if (t >= 1) { clearInterval(interval); expressionManager.setValue(VRMExpressionPresetName.Blink, 0); }
  }, 16);
}

/* ================================================================
   CHAT MEMORY — localStorage persistence across sessions
   Stores a stable device ID and the full message history so
   returning users see their previous conversation on load.
   ================================================================ */
const ChatMemory = (() => {
  const KEY_ID      = "fireforge_device_id";
  const KEY_HISTORY = "fireforge_chat_history";
  const MAX_STORED  = 120; // keep last N messages to avoid unbounded growth

  // Return (or create) a stable device identifier
  function getDeviceId() {
    let id = localStorage.getItem(KEY_ID);
    if (!id) {
      id = "dev_" + Date.now().toString(36) + "_" + Math.random().toString(36).slice(2, 8);
      localStorage.setItem(KEY_ID, id);
    }
    return id;
  }

  // Load raw message array from localStorage
  function load() {
    try { return JSON.parse(localStorage.getItem(KEY_HISTORY) || "[]"); }
    catch { return []; }
  }

  // Persist a new message entry
  function save(sender, text, isUser) {
    const history = load();
    history.push({ sender, text, isUser, ts: Date.now() });
    // Trim to cap
    if (history.length > MAX_STORED) history.splice(0, history.length - MAX_STORED);
    localStorage.setItem(KEY_HISTORY, JSON.stringify(history));
  }

  // Render past messages into the chat UI on page load.
  // Returns true if history existed, false if this is a first visit.
  function restore() {
    const history = load();
    if (history.length === 0) return false;

    const chatHistory = document.getElementById("chat-history");
    if (!chatHistory) return false;

    history.forEach(({ sender, text, isUser }) => {
      const msgDiv = document.createElement("div");
      msgDiv.className = `message ${isUser ? "user-msg" : "mentor-msg"}`;
      msgDiv.textContent = text;
      chatHistory.appendChild(msgDiv);
    });
    chatHistory.scrollTop = chatHistory.scrollHeight;
    console.log(`[Memory] Restored ${history.length} messages for device ${getDeviceId()}`);
    return true;
  }

  // Expose public API
  return { save, restore, getDeviceId };
})();

/* ---------------- Chat / idle cues ---------------- */
function addMessage(sender, text, isUser = false) {
  const history = document.getElementById("chat-history");
  if (!history) return;
  const msgDiv = document.createElement("div");
  msgDiv.className = `message ${isUser ? "user-msg" : "mentor-msg"}`;
  msgDiv.textContent = text;
  history.appendChild(msgDiv);
  history.scrollTop = history.scrollHeight;
  // Persist to localStorage
  ChatMemory.save(sender, text, isUser);
}

function handleInput() {
  const inputField = document.getElementById("text-input");
  if (!inputField) return;
  const text = inputField.value.trim();
  if (!text) return;
  registerActivity();
  addMessage("You", text, true);
  inputField.value = "";
  const reply = getMentorReply(text);
  setTimeout(() => {
    addMessage(MENTOR_NAME, reply.text);
    triggerPose(reply.pose);
    MentorVoice.speak(reply.id, reply.text);
  }, 450);
}

init().catch((e) => {
  console.error("Fatal error during startup:", e);
  showLoadError("FireForge AI failed to start up. This usually means a script or resource above failed.");
});
</script>
